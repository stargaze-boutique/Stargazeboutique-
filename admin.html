<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Stargaze Boutique</title>
<style>
body{margin:0;font-family:Arial;}
header{display:flex;justify-content:space-between;padding:20px 40px;border-bottom:1px solid #eee;}
.logo{font-size:24px;font-weight:bold;}
nav a{margin-left:20px;text-decoration:none;color:black;}
h1{text-align:center;margin-top:20px;}
form{max-width:400px;margin:20px auto;display:flex;flex-direction:column;}
input{padding:10px;margin-bottom:10px;font-size:16px;}
button{background:black;color:white;padding:10px;font-size:16px;border:none;cursor:pointer;}
#productList{max-width:600px;margin:20px auto;}
.product-item{display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:10px 0;}
</style>
</head>
<body>

<header>
  <div class="logo">STARGAZE</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<h1>Admin Panel</h1>

<form id="addProductForm">
  <input type="text" id="name" placeholder="Product Name" required>
  <input type="number" id="price" placeholder="Price" required>
  <input type="text" id="image" placeholder="Image Filename (e.g., images/kurti1.jpg)" required>
  <input type="text" id="category" placeholder="Category (e.g., Kurti)" required>
  <button type="submit">Add Product</button>
</form>

<div id="productList"></div>

<script>
let products = [
  {id:1, name:"Pink Lehenga", price:2500, image:"images/lehenga1.jpg", category:"Lehenga"},
  {id:2, name:"Blue Kurti", price:1200, image:"images/kurti1.jpg", category:"Kurti"},
  {id:3, name:"Designer Saree", price:1800, image:"images/saree1.jpg", category:"Saree"},
  {id:4, name:"Party Gown", price:3000, image:"images/gown1.jpg", category:"Gown"},
  {id:5, name:"Pakistan Suit", price:2000, image:"images/pakistan_suit1.jpg", category:"Suit"}
];

const form = document.getElementById("addProductForm");
const list = document.getElementById("productList");

function render(){
  list.innerHTML = "";
  products.forEach((p,i)=>{
    list.innerHTML += `<div class="product-item">
      ${p.name} - ₹${p.price} (${p.category}) 
      <button onclick="deleteProduct(${i})">Delete</button>
    </div>`;
  });
}

function deleteProduct(i){
  products.splice(i,1);
  render();
}

form.addEventListener("submit",e=>{
  e.preventDefault();
  const name = document.getElementById("name").value;
  const price = parseInt(document.getElementById("price").value);
  const image = document.getElementById("image").value;
  const category = document.getElementById("category").value;
  products.push({id:products.length+1,name,price,image,category});
  form.reset();
  render();
});

render();
</script>

</body>
</html>
