<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stargaze Boutique - Zara Style V50</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/premium-snippet.css">
  <script defer src="js/main.js"></script>
  <script defer src="js/products.js"></script>
  <script defer src="js/whatsapp.js"></script>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="logo">
      <img src="images/logo/logo.png" alt="Stargaze Boutique Logo">
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- HERO BANNER -->
  <section class="hero-banner">
    <img src="images/hero/hero1.jpg" alt="Banner" class="hero-image">
    <div class="hero-content">
      <h1>New Zara-Style Collection</h1>
      <p>Trendy, Elegant, Affordable</p>
      <a href="shop.html" class="btn-primary">Shop Now</a>
    </div>
  </section>

  <!-- FEATURED PRODUCTS -->
  <section class="featured-products">
    <h2>Featured Products</h2>
    <div class="products-grid" id="featured-products">
      <!-- Products will be dynamically inserted from products.js -->
    </div>
  </section>

  <!-- ADS SECTION -->
  <section class="ad-banner">
    <img src="images/ads/ad1.jpg" alt="Ad Banner">
  </section>

  <!-- FLOATING WHATSAPP BUTTON -->
  <div id="whatsapp-button">
    <a href="https://wa.me/1234567890" target="_blank">
      <img src="images/icons/whatsapp.png" alt="WhatsApp">
    </a>
  </div>

  <!-- AI CHAT PLACEHOLDER -->
  <div id="ai-chat">
    <button id="ai-chat-toggle">Chat</button>
    <div id="ai-chat-box">
      <p>Welcome! How can we assist you today?</p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 Stargaze Boutique. All rights reserved.</p>
    <nav>
      <ul>
        <li><a href="disclaimer.html">Privacy & Policy</a></li>
        <li><a href="size-chart.html">Size Chart</a></li>
      </ul>
    </nav>
  </footer>
</body>
</html>
