<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stargaze Boutique</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
}

/* Header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
border-bottom:1px solid #eee;
}

.logo{
font-size:24px;
font-weight:bold;
letter-spacing:3px;
}

nav a{
margin-left:20px;
text-decoration:none;
color:black;
font-size:14px;
}

/* Hero Banner */

.hero{
position:relative;
height:500px;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
}

.hero-text{
position:absolute;
bottom:40px;
left:40px;
color:white;
}

.hero-text h1{
font-size:40px;
}

.hero-text a{
background:black;
color:white;
padding:12px 20px;
text-decoration:none;
}

/* Product Grid */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.product img{
width:100%;
}

.product h3{
font-size:16px;
}

.product p{
color:#666;
}

/* WhatsApp Button */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:12px 18px;
border-radius:30px;
text-decoration:none;
}

/* Footer */

footer{
text-align:center;
padding:40px;
border-top:1px solid #eee;
}

</style>
</head>

<body>

<header class="header">

<div class="logo">STARGAZE</div>

<nav>
<a href="shop.html">Shop</a>
<a href="sarees.html">Sarees</a>
<a href="kurti.html">Kurti</a>
<a href="cart.html">Cart</a>
</nav>

</header>


<section class="hero">

<img src="images/banner1.jpg">

<div class="hero-text">
<h1>NEW COLLECTION</h1>
<a href="shop.html">SHOP NOW</a>
</div>

</section>


<section class="products">

<div class="product">
<img src="images/lehenga1.jpg">
<h3>Pink Lehenga</h3>
<p>₹2500</p>
</div>

<div class="product">
<img src="images/kurti1.jpg">
<h3>Blue Kurti</h3>
<p>₹1200</p>
</div>

<div class="product">
<img src="images/saree1.jpg">
<h3>Designer Saree</h3>
<p>₹1800</p>
</div>

<div class="product">
<img src="images/gown1.jpg">
<h3>Party Gown</h3>
<p>₹3000</p>
</div>

</section>


<a href="https://wa.me/919000000000" class="whatsapp">WhatsApp</a>


<footer>
© 2026 Stargaze Boutique
</footer>


</body>
</html>
