<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stargaze Boutique</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#111;color:white;}
.logo{font-size:22px;font-weight:bold;}
.header a{color:white;text-decoration:none;margin-left:10px;}
.menu{display:flex;gap:18px;overflow-x:auto;padding:10px;background:white;border-bottom:1px solid #ddd;}
.menu a{font-weight:bold;cursor:pointer;}
.hero{position:relative;height:360px;overflow:hidden;}
.slide{position:absolute;width:100%;height:100%;display:none;}
.slide img{width:100%;height:100%;object-fit:cover;}
.active{display:block;}
.categories{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:15px;padding:20px;}
.category{background:white;border-radius:6px;text-align:center;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.category img{width:100%;height:100px;object-fit:cover;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;padding:20px;}
.product{background:white;padding:10px;border-radius:6px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.product img{width:100%;height:170px;object-fit:cover;}
.product button{background:#ff4081;color:white;border:none;padding:8px 14px;cursor:pointer;border-radius:4px;}
.deals{background:#ffe4ec;text-align:center;padding:25px;font-size:22px;font-weight:bold;}
.footer{background:#111;color:white;text-align:center;padding:20px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
<div class="logo">Stargaze Boutique</div>
<div>
<a href="shop.html">Shop</a>
<a href="cart.html">🛒 Cart</a>
<a href="admin.html">Admin</a>
</div>
</div>

<!-- MENU -->
<div class="menu">
<a onclick="filterCategory('All')">All</a>
<a onclick="filterCategory('Lehenga')">Lehenga</a>
<a onclick="filterCategory('Kurti')">Kurti</a>
<a onclick="filterCategory('Saree')">Saree</a>
<a onclick="filterCategory('Gown')">Gown</a>
<a onclick="filterCategory('Pakistan Suit')">Pakistan Suit</a>
<a onclick="filterCategory('India Suit')">India Suit</a>
<a onclick="filterCategory('Ladies Innerwear')">Ladies Innerwear</a>
</div>

<!-- HERO SLIDER -->
<div class="hero">
<div class="slide active"><img src="images/banner1.jpg" alt="Banner 1"></div>
<div class="slide"><img src="images/banner2.jpg" alt="Banner 2"></div>
</div>

<!-- CATEGORIES -->
<div class="categories">
<div class="category"><img src="images/lehenga.jpg"><p>Lehenga</p></div>
<div class="category"><img src="images/kurti.jpg"><p>Kurti</p></div>
<div class="category"><img src="images/saree.jpg"><p>Saree</p></div>
<div class="category"><img src="images/gown.jpg"><p>Gown</p></div>
</div>

<!-- PRODUCTS -->
<div class="products"></div>

<!-- DEALS -->
<div class="deals">🔥 FESTIVE SALE – UP TO 50% OFF</div>

<!-- FOOTER -->
<div class="footer">© 2026 Stargaze Boutique</div>

<script>
// Sample products for demo
let products = JSON.parse(localStorage.getItem("products")) || [
    {name:"Designer Lehenga",price:149,image:"images/lehenga.jpg",category:"Lehenga"},
    {name:"Party Gown",price:119,image:"images/gown.jpg",category:"Gown"},
    {name:"Elegant Saree",price:79,image:"images/saree.jpg",category:"Saree"},
    {name:"Stylish Kurti",price:49,image:"images/kurti.jpg",category:"Kurti"}
];

// Display products
let container = document.querySelector(".products");
function displayProducts(list){
    let html="";
    list.forEach(p=>{
        html+=`
        <div class="product" data-category="${p.category}">
            <img src="${p.image}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>$${p.price}</p>
            <button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
        </div>`;
    });
    container.innerHTML = html;
}
displayProducts(products);

// Filter products
function filterCategory(cat){
    if(cat==='All'){displayProducts(products); return;}
    let filtered = products.filter(p=>p.category===cat);
    displayProducts(filtered);
}

// Add to cart
function addToCart(name,price){
    let cart = JSON.parse(localStorage.getItem("cart"))||[];
    cart.push({name,price});
    localStorage.setItem("cart",JSON.stringify(cart));
    alert(name + " added to cart!");
}

// Hero slider
let slides=document.querySelectorAll(".slide"),current=0;
setInterval(()=>{
slides[current].classList.remove("active");
current=(current+1)%slides.length;
slides[current].classList.add("active");
},4000);
</script>

</body>
</html>
