<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stargaze Boutique - Size Chart</title>
<style>
body{margin:0;font-family:sans-serif;background:#f7f7f7;color:#333;}
header{background:#d6336c;color:white;padding:15px;font-size:28px;font-weight:bold;text-align:center;}
table{width:90%;max-width:800px;margin:30px auto;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;}
th,td{padding:12px 15px;text-align:center;border-bottom:1px solid #eee;}
th{background:#d6336c;color:white;}
tr:hover{background:#f1f1f1;}
caption{caption-side:top;font-size:24px;font-weight:bold;margin-bottom:10px;color:#d6336c;}
</style>
</head>
<body>

<header>🛍️ Stargaze Boutique - Size Chart</header>

<table>
  <caption>Women's Clothing Size Chart</caption>
  <thead>
    <tr>
      <th>Size</th>
      <th>Bust (inches)</th>
      <th>Waist (inches)</th>
      <th>Hip (inches)</th>
      <th>Length (inches)</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>S</td>
      <td>32-34</td>
      <td>26-28</td>
      <td>34-36</td>
      <td>40</td>
    </tr>
    <tr>
      <td>M</td>
      <td>34-36</td>
      <td>28-30</td>
      <td>36-38</td>
      <td>41</td>
    </tr>
    <tr>
      <td>L</td>
      <td>36-38</td>
      <td>30-32</td>
      <td>38-40</td>
      <td>42</td>
    </tr>
    <tr>
      <td>XL</td>
      <td>38-40</td>
      <td>32-34</td>
      <td>40-42</td>
      <td>43</td>
    </tr>
    <tr>
      <td>XXL</td>
      <td>40-42</td>
      <td>34-36</td>
      <td>42-44</td>
      <td>44</td>
    </tr>
  </tbody>
</table>

</body>
</html>
