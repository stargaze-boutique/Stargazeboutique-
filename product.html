<script src="products.js"></script>

<script>

const container = document.getElementById("products")

products.forEach(p => {

container.innerHTML += `

<div class="product">

<img src="${p.image}">

<h3>${p.name}</h3>

<p>₹${p.price}</p>

<button onclick="addCart(${p.id})">Add to Cart</button>

<button onclick="buyWhatsApp('${p.name}',${p.price})">
Order WhatsApp
</button>

</div>

`

})

</script>
