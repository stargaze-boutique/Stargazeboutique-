<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stargaze Boutique - Product</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#111;color:white;position:sticky;top:0;z-index:100;}
.header a{color:white;text-decoration:none;margin-left:15px;font-weight:500;}
.header a:hover{color:#ff4081;}
.product-detail{display:flex;flex-direction:column;align-items:center;padding:20px;}
.product-detail img{width:300px;height:300px;object-fit:cover;border-radius:10px;transition:transform 0.4s ease,box-shadow 0.4s ease;}
.product-detail img:hover{transform:scale(1.05);box-shadow:0 8px 20px rgba(0,0,0,0.18);}
.product-detail h2{margin:15px 0 10px 0;}
.product-detail p{color:#ff4081;font-weight:bold;margin-bottom:15px;}
.product-detail button{background:#ff4081;color:white;border:none;padding:10px 18px;cursor:pointer;border-radius:6px;margin:5px;transition:background 0.3s ease;}
.product-detail button:hover{background:#e73370;}
.footer{background:#111;color:white;text-align:center;padding:20px;margin-top:30px;}
</style>
</head>
<body>

<div class="header">
<div class="logo">Stargaze Boutique</div>
<div>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">🛒 Cart</a>
<a href="admin.html">Admin</a>
</div>
</div>

<div class="product-detail">
<img id="productImage" src="images/lehenga1.jpg" alt="Product">
<h2 id="productName">Premium Red Lehenga</h2>
<p id="productPrice">$149</p>
<button onclick="addToCart()">Add to Cart</button>
<button onclick="orderWhatsApp()">Order via WhatsApp</button>
</div>

<div class="footer">© 2026 Stargaze Boutique</div>

<script>
// Use first product as default
let products=JSON.parse(localStorage.getItem("products"))||[];
let product=products[0]; // You can later pass product via query string

document.getElementById("productName").innerText=product.name;
document.getElementById("productPrice").innerText="$"+product.price;
document.getElementById("productImage").src=product.image;

// Add to cart
function addToCart(){
    let cart=JSON.parse(localStorage.getItem("cart"))||[];
    cart.push({name:product.name,price:product.price});
    localStorage.setItem("cart",JSON.stringify(cart));
    alert(product.name+" added to cart!");
}

// WhatsApp order
function orderWhatsApp(){
    let phone="971XXXXXXXXX"; // Replace with your WhatsApp number
    let message="Hello, I want to order: "+product.name+" - $"+product.price;
    window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(message));
}
</script>

</body>
</html>
