<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist - Stargaze Boutique V50</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/products.js"></script>
  <script defer src="js/wishlist.js"></script>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="logo">
      <img src="images/logo/logo.png" alt="Stargaze Boutique Logo">
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- WISHLIST SECTION -->
  <section class="wishlist-section">
    <h1>Your Wishlist</h1>
    <div id="wishlist-items">
      <!-- Wishlist items dynamically loaded -->
    </div>
  </section>

  <!-- FLOATING WHATSAPP BUTTON -->
  <div id="whatsapp-button">
    <a href="https://wa.me/1234567890" target="_blank">
      <img src="images/icons/whatsapp.png" alt="WhatsApp">
    </a>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 Stargaze Boutique. All rights reserved.</p>
    <nav>
      <ul>
        <li><a href="disclaimer.html">Privacy & Policy</a></li>
        <li><a href="size-chart.html">Size Chart</a></li>
      </ul>
    </nav>
  </footer>

  <script>
    const wishlistContainer = document.getElementById("wishlist-items");

    let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

    function renderWishlist() {
      if(wishlist.length === 0) {
        wishlistContainer.innerHTML = "<p>Your wishlist is empty.</p>";
        return;
      }

      wishlistContainer.innerHTML = "";
      wishlist.forEach((item, index) => {
        const product = products.find(p => p.id === item.id);
        if(!product) return;

        const wishlistItemEl = document.createElement("div");
        wishlistItemEl.classList.add("wishlist-item");
        wishlistItemEl.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <div class="wishlist-item-info">
            <h3>${product.name}</h3>
            <p>Material: ${product.material}</p>
            <p>Price: ${product.price}</p>
            <div>
              <button data-index="${index}" class="move-cart-btn">Move to Cart</button>
              <button data-index="${index}" class="remove-btn">Remove</button>
            </div>
          </div>
        `;
        wishlistContainer.appendChild(wishlistItemEl);
      });

      // Event listeners
      document.querySelectorAll(".remove-btn").forEach(btn => {
        btn.addEventListener("click", e => {
          const idx = e.target.dataset.index;
          wishlist.splice(idx, 1);
          localStorage.setItem("wishlist", JSON.stringify(wishlist));
          renderWishlist();
        });
      });

      document.querySelectorAll(".move-cart-btn").forEach(btn => {
        btn.addEventListener("click", e => {
          const idx = e.target.dataset.index;
          let cart = JSON.parse(localStorage.getItem("cart")) || [];
          const productId = wishlist[idx].id;
          const existing = cart.find(c => c.id === productId);
          if(existing) {
            existing.quantity += 1;
          } else {
            cart.push({id: productId, quantity: 1});
          }
          localStorage.setItem("cart", JSON.stringify(cart));
          wishlist.splice(idx, 1);
          localStorage.setItem("wishlist", JSON.stringify(wishlist));
          renderWishlist();
          alert("Product moved to cart!");
        });
      });
    }

    renderWishlist();
  </script>
</body>
</html>
