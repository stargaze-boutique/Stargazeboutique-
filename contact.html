<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Stargaze Boutique V50</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="logo">
      <a href="index.html"><img src="images/logo/logo.png" alt="Stargaze Boutique Logo"></a>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>
  </header>

  <!-- HERO/BANNER -->
  <section class="contact-hero">
    <img src="images/banner/contact-banner.jpg" alt="Contact Stargaze Boutique">
    <div class="hero-text">
      <h1>Contact Us</h1>
      <p>We’d love to hear from you! Reach out for queries, feedback, or collaboration.</p>
    </div>
  </section>

  <!-- CONTACT FORM -->
  <section class="contact-form-section">
    <div class="container">
      <form action="mailto:info@stargazeboutique.com" method="POST" enctype="text/plain">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Your Email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>
      </form>

      <!-- Additional contact info -->
      <div class="contact-info">
        <p>Email: <a href="mailto:info@stargazeboutique.com">info@stargazeboutique.com</a></p>
        <p>WhatsApp: <a href="https://wa.me/1234567890" target="_blank">+971 123 456 7890</a></p>
      </div>
    </div>
  </section>

  <!-- WHATSAPP BUTTON -->
  <div id="whatsapp-button">
    <a href="https://wa.me/1234567890" target="_blank">
      <img src="images/icons/whatsapp.png" alt="WhatsApp">
    </a>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 Stargaze Boutique. All rights reserved.</p>
    <nav>
      <ul>
        <li><a href="disclaimer.html">Privacy & Policy</a></li>
        <li><a href="size-chart.html">Size Chart</a></li>
      </ul>
    </nav>
  </footer>
</body>
</html>
