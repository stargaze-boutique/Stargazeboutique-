<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Stargaze Boutique</title>
<style>
body{margin:0;font-family:Arial;}
.header{display:flex;justify-content:space-between;padding:20px 40px;border-bottom:1px solid #eee;}
.logo{font-size:24px;font-weight:bold;}
nav a{margin-left:20px;text-decoration:none;color:black;}
.cart-container{padding:20px;}
.cart-item{display:flex;align-items:center;margin-bottom:15px;border-bottom:1px solid #eee;padding-bottom:10px;}
.cart-item img{width:100px;margin-right:20px;}
.cart-item h3{margin:0;flex:1;}
.cart-item p{margin:0 20px;}
button{background:black;color:white;padding:5px 10px;border:none;cursor:pointer;}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:12px 20px;border-radius:30px;text-decoration:none;}
</style>
</head>
<body>

<header class="header">
  <div class="logo">STARGAZE</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<h1 style="text-align:center;margin-top:20px;">Your Cart</h1>

<div class="cart-container" id="cartContainer"></div>

<a href="#" class="whatsapp" id="checkoutBtn">Checkout via WhatsApp</a>

<script>
const products = [
  {id:1, name:"Pink Lehenga", price:2500, image:"images/lehenga1.jpg", category:"Lehenga"},
  {id:2, name:"Blue Kurti", price:1200, image:"images/kurti1.jpg", category:"Kurti"},
  {id:3, name:"Designer Saree", price:1800, image:"images/saree1.jpg", category:"Saree"},
  {id:4, name:"Party Gown", price:3000, image:"images/gown1.jpg", category:"Gown"},
  {id:5, name:"Pakistan Suit", price:2000, image:"images/pakistan_suit1.jpg", category:"Suit"}
];

// Load cart from localStorage or empty array
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartContainer = document.getElementById("cartContainer");

// Render cart items
function renderCart(){
  cartContainer.innerHTML = "";
  cart.forEach((p,i)=>{
    cartContainer.innerHTML += `
      <div class="cart-item">
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="removeItem(${i})">Remove</button>
      </div>`;
  });
}
function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

// WhatsApp checkout
const checkoutBtn = document.getElementById("checkoutBtn");
checkoutBtn.addEventListener("click", ()=>{
  if(cart.length === 0){
    alert("Cart is empty!");
    return;
  }
  let msg = "Hello, I want to buy:\n";
  let total = 0;
  cart.forEach(p=>{
    msg += `${p.name} - ₹${p.price}\n`;
    total += p.price;
  });
  msg += `Total: ₹${total}`;
  window.open("https://wa.me/919000000000?text="+encodeURIComponent(msg));
});

renderCart();
</script>

</body>
</html>
