<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Stargazeboutique</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <img src="images/logo.png" alt="Stargazeboutique Logo" style="height:50px;">
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
    <a href="wishlist.html">Wishlist</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<h1>Your Cart</h1>

<section class="cart-items">

  <div class="cart-item">
    <img src="images/product-images/kurti1.jpg" alt="Designer Kurti Set">
    <div class="item-info">
      <h3>Designer Kurti Set</h3>
      <p>Price: 149 AED</p>
      <p>Quantity: 1</p>
      <button>Remove</button>
    </div>
  </div>

  <div class="cart-item">
    <img src="images/product-images/lehenga1.jpg" alt="Wedding Lehenga">
    <div class="item-info">
      <h3>Wedding Lehenga</h3>
      <p>Price: 399 AED</p>
      <p>Quantity: 1</p>
      <button>Remove</button>
    </div>
  </div>

</section>

<div class="cart-summary">
  <h2>Cart Summary</h2>
  <p>Total Items: 2</p>
  <p>Total Price: 548 AED</p>
  <button>Proceed to Checkout</button>
</div>

<footer>
