<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stargaze Boutique - Cart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:0; background:#fff; }
        header { background:#ff4081; color:#fff; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; }
        header a { color:#fff; text-decoration:none; margin-left:15px; }
        .container { width:90%; margin:auto; padding:20px; }
        table { width:100%; border-collapse: collapse; margin-top:20px; }
        th, td { border:1px solid #ddd; padding:10px; text-align:center; }
        th { background:#f8f8f8; }
        button { background:#ff4081; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; }
        button:hover { background:#e73370; }
        footer { background:#333; color:#fff; text-align:center; padding:15px; margin-top:20px; }
    </style>
</head>
<body>

<header>
    <h1>Stargaze Boutique</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart</a>
    </nav>
</header>

<div class="container">
    <h2>Your Cart</h2>
    <table id="cartTable">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Remove</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <p id="totalPrice"></p>
    <button onclick="checkoutWhatsApp()">Checkout via WhatsApp</button>
</div>

<footer>
    © 2026 Stargaze Boutique. All rights reserved.
</footer>

<script>
// Load cart from localStorage
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const cartTableBody = document.querySelector("#cartTable tbody");
const totalPriceEl = document.getElementById("totalPrice");

function displayCart(){
    cartTableBody.innerHTML = "";
    let total = 0;
    cart.forEach((item,index)=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${item.name}</td>
            <td>$${item.price}</td>
            <td><button onclick="removeItem(${index})">Remove</button></td>
        `;
        cartTableBody.appendChild(tr);
        total += item.price;
    });
    totalPriceEl.innerText = "Total: $" + total;
}

function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function checkoutWhatsApp(){
    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }
    window.location.href = "checkout.html";
}

// Initial display
displayCart();
</script>

</body>
</html>
